name: Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET Core
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.x

      - name: Setup Erlang/OTP
        uses: erlef/setup-beam@v1
        with:
          otp-version: '27'
          rebar3-version: '3'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install just
        uses: extractions/setup-just@v3

      - name: Restore dependencies
        run: dotnet tool restore

      - name: Build library
        run: dotnet build src/Fable.Actor

      - name: Build tests
        run: dotnet build test

      - name: Run .NET tests
        run: dotnet run --project test

      - name: Compile tests to Python
        run: dotnet fable test --lang python --outDir build/tests --exclude Fable.Core --noCache

      - name: Run Python tests
        run: cd build/tests && uv run --project ../.. python program.py

      - name: Build BEAM and run tests
        run: just test-beam

      - name: Pack NuGet
        run: just pack
